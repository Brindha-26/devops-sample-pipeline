version: 0.1
component: build

timeoutInSeconds: 600

steps:
  - type: Command
    name: Install Maven
    command: |
      echo "Checking Maven version"
      mvn -version

  - type: Command
    name: Build Application
    command: |
      echo "Cleaning and building project"
      mvn clean install -DskipTests

  - type: Command
    name: Run Tests
    command: |
      echo "Running tests"
      mvn test

  - type: Command
    name: Package Application
    command: |
      echo "Packaging application"
      mvn package

outputArtifacts:
  - name: build_output
    type: BINARY
    location: target
