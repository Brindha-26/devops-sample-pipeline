version: 0.1
component: build

timeoutInSeconds: 600

steps:
  - type: Command
    name: Show Project Structure
    command: |
      echo "Current directory:"
      pwd
      echo "Files:"
      ls -la

  - type: Command
    name: Check Maven
    command: |
      mvn -version

  - type: Command
    name: Build Project
    command: |
      echo "Building Maven project..."
      mvn clean compile
